<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ManSys</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #555;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.08);
  --blue: #4a9eff;
  --blue-dim: rgba(74,158,255,0.1);
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.1);
  --amber: #ffb347;
  --green: #4dff91;
  --green-dim: rgba(77,255,145,0.1);
  --purple: #b47fff;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --tab-h: 64px;
  --top-h: 56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow: hidden; }

/* Auth */
#auth-gate { display: none; position: fixed; inset: 0; background: var(--bg); align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 999; }
#auth-gate p { font-family: var(--mono); font-size: 12px; color: var(--red); }

/* App shell */
#app { display: none; height: 100vh; height: 100dvh; flex-direction: column; }

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; min-height: calc(var(--safe-top) + var(--top-h));
}
.brand { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.1em; }
.tab-title { font-family: var(--mono); font-size: 13px; color: var(--text); letter-spacing: 0.04em; }
.add-fab { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; color: #0f0f0f; font-weight: 300; line-height: 1; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
.stat { padding: 8px 10px; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
.stat-value { font-family: var(--mono); font-size: 18px; font-weight: 500; }
.stat-value.accent { color: var(--accent); }
.stat-value.red { color: var(--red); }
.stat-value.blue { color: var(--blue); }
.stat-value.amber { color: var(--amber); }

/* Search bar */
.search-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
.search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 14px; border-radius: 8px; padding: 9px 14px; outline: none; }
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); }

/* List */
.list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--tab-h) + var(--safe-bot) + 8px); }
.card { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 16px; cursor: pointer; transition: background 0.1s; active-state: none; }
.card:active { background: var(--bg3); }
.card-title { font-size: 14px; font-weight: 400; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
.card-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.02em; }
.b-green  { background: rgba(77,255,145,0.1);  color: var(--green);  border: 1px solid rgba(77,255,145,0.2); }
.b-blue   { background: rgba(74,158,255,0.1);  color: var(--blue);   border: 1px solid rgba(74,158,255,0.2); }
.b-red    { background: rgba(255,95,95,0.1);   color: var(--red);    border: 1px solid rgba(255,95,95,0.2); }
.b-amber  { background: rgba(255,179,71,0.1);  color: var(--amber);  border: 1px solid rgba(255,179,71,0.2); }
.b-gray   { background: rgba(255,255,255,0.04); color: var(--text2); border: 1px solid var(--border2); }
.b-purple { background: rgba(180,127,255,0.1); color: var(--purple); border: 1px solid rgba(180,127,255,0.2); }
.b-must   { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,255,0,0.2); font-size: 9px; }
.b-deep   { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(74,158,255,0.2); font-size: 9px; }
.overdue-date { color: var(--red); }
.empty-state { text-align: center; padding: 60px 24px; color: var(--text3); font-family: var(--mono); font-size: 12px; }

/* Bottom tab bar */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; z-index: 50;
}
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: transparent; color: var(--text3); transition: color 0.12s; padding-top: 2px; }
.tab-item.active { color: var(--accent); }
.tab-icon { font-size: 18px; line-height: 1; }
.tab-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; }

/* Slide-up sheet */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: 16px 16px 0 0; border-top: 1px solid var(--border2); z-index: 101; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height: 92vh; display: flex; flex-direction: column; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 4px; flex-shrink: 0; }
.sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 20px 14px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.sheet-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.04em; }
.sheet-close { width: 32px; height: 32px; background: var(--bg3); border: none; border-radius: 8px; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 20px; flex: 1; padding-bottom: calc(var(--safe-bot) + 80px); }
.sheet-footer { position: sticky; bottom: 0; background: var(--bg2); padding: 12px 20px calc(var(--safe-bot) + 12px); border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
.btn-cancel { flex: 1; padding: 13px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 12px; border-radius: 10px; cursor: pointer; }
.btn-save { flex: 2; padding: 13px; background: var(--accent); border: none; color: #0f0f0f; font-family: var(--mono); font-size: 12px; font-weight: 500; border-radius: 10px; cursor: pointer; }
.btn-delete-sheet { flex: 1; padding: 13px; background: transparent; border: 1px solid rgba(255,95,95,0.3); color: var(--red); font-family: var(--mono); font-size: 12px; border-radius: 10px; cursor: pointer; }

/* Form fields */
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
  font-family: var(--font); font-size: 15px; border-radius: 8px; padding: 11px 12px; outline: none;
  -webkit-appearance: none; appearance: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-row textarea { min-height: 80px; resize: none; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; }
.checkbox-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
.checkbox-row label { font-size: 13px; color: var(--text2); cursor: pointer; }
.form-error { font-family: var(--mono); font-size: 11px; color: var(--red); margin-top: 8px; }
.select-arrow { position: relative; }
.select-arrow::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 12px; }
.select-arrow select { padding-right: 32px; }

/* Card swipe hint */
.card-row { display: flex; align-items: flex-start; justify-content: space-between; }
.card-arrow { color: var(--text3); font-size: 14px; margin-top: 2px; flex-shrink: 0; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 11px; }

::-webkit-scrollbar { display: none; }

/* Filter sheet */
.filter-pill { display: flex; align-items: center; gap: 4px; padding: 5px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; font-family: var(--mono); font-size: 10px; color: var(--text2); cursor: pointer; white-space: nowrap; }
.filter-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.filter-bar { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-section { margin-bottom: 20px; }
.filter-section-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.filter-chip { padding: 7px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; font-family: var(--mono); font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.12s; }
.filter-chip.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.filter-reset { padding: 13px; background: transparent; border: 1px solid var(--border2); color: var(--text3); font-family: var(--mono); font-size: 12px; border-radius: 10px; cursor: pointer; flex: 1; }
.filter-apply { flex: 2; padding: 13px; background: var(--accent); border: none; color: #0f0f0f; font-family: var(--mono); font-size: 12px; font-weight: 500; border-radius: 10px; cursor: pointer; }
</style>
</head>
<body>

<div id="auth-gate">
  <p>&#x2715; Access denied</p>
</div>

<div id="app" style="display:none;flex-direction:column;height:100dvh">
  <div class="topbar">
    <div class="brand">&#x25A0; MANSYS</div>
    <div class="tab-title" id="tab-title">Tasks</div>
    <div style="display:flex;gap:8px">
      <button class="add-fab" id="filter-btn" onclick="openFilters()" style="background:var(--bg3);color:var(--text2);font-size:16px">⚙</button>
      <button class="add-fab" onclick="openAdd()">+</button>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar" style="display:none"></div>
  <div class="stats-row" id="stats-row"></div>
  <div class="search-bar">
    <input class="search-input" id="search-input" type="search" placeholder="Search..." oninput="applyFilters()">
  </div>
  <div class="list-wrap" id="list-wrap">
    <div class="loading" id="loading-msg">Loading...</div>
  </div>
  <div class="tabbar" id="tabbar"></div>
</div>

<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="sheet-title">Add task</span>
    <button class="sheet-close" onclick="closeSheet()">&#x2715;</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-footer" id="sheet-footer"></div>
</div>

<script>
const ACCESS_TOKEN = 'fdb44961c5a73eb588b68e9614f58671';
const SUPABASE_URL = 'https://dglotzmioswcmhfttcqx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbG90em1pb3N3Y21oZnR0Y3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTE3MzgsImV4cCI6MjA4ODU2NzczOH0.lF_8yxfnP50UpiMKCW3aQxq8HukVZ5ibRqOp-RwFvpQ';

function checkAuth() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('token') !== ACCESS_TOKEN) {
    document.getElementById('auth-gate').style.display = 'flex';
    return false;
  }
  document.getElementById('app').style.display = 'flex';
  return true;
}

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', ...(opts.prefer ? { Prefer: opts.prefer } : {}) },
    method: opts.method || 'GET',
    body: opts.body != null ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

let ref = { statuses: [], themes: [], people: [], epics: [], personTypes: [] };
let activeFilters = { status: [], theme: null, owner: null, priority: null };
let activeTab = 'tasks';
let allRows = [];
let editingId = null;

async function loadRef() {
  const [s, t, p, e, pt] = await Promise.all([
    api('statuses?select=status_id,status_label&order=status_id.asc'),
    api('themes?select=theme_id,title&order=title.asc'),
    api('people?select=person_id,full_name&order=full_name.asc'),
    api('roadmap_items?select=roadmap_item_id,title&order=title.asc'),
    api('person_types?select=person_type_id,description&order=description.asc'),
  ]);
  ref.statuses = s || []; ref.themes = t || []; ref.people = p || []; ref.epics = e || []; ref.personTypes = pt || [];
}

const TABS = [
  { id: 'tasks',       label: 'Tasks',       icon: '✓' },
  { id: 'themes',      label: 'Themes',      icon: '◈' },
  { id: 'epics',       label: 'Epics',       icon: '◎' },
  { id: 'commitments', label: 'Commits',     icon: '⟳' },
  { id: 'people',      label: 'People',      icon: '◉' },
];

const DONE = ['Done', 'Delivered'];

const TAB_DEF = {
  tasks: {
    endpoint: 'tasks?select=task_id,title,description,priority,promise_date,is_must_achieve,is_deep_work,status_id,theme_id,epic_id,owner_id,requested_by_id,created_at,last_updated_at,statuses(status_label),themes(title),roadmap_items(title),people!tasks_owner_id_fkey(full_name)&order=created_at.desc',
    idKey: 'task_id',
    stats(d) {
      const today = new Date().toISOString().substring(0,10);
      return [
        { label: 'Active', value: d.filter(r => !DONE.includes(r.statuses?.status_label)).length, cls: '' },
        { label: 'Must', value: d.filter(r => r.is_must_achieve && !DONE.includes(r.statuses?.status_label)).length, cls: 'accent' },
        { label: 'Progress', value: d.filter(r => r.statuses?.status_label === 'In Progress').length, cls: 'blue' },
        { label: 'Overdue', value: d.filter(r => r.promise_date && r.promise_date < today && !DONE.includes(r.statuses?.status_label)).length, cls: 'red' },
      ];
    },
    card(r) {
      const today = new Date().toISOString().substring(0,10);
      const overdue = r.promise_date && r.promise_date < today && !DONE.includes(r.statuses?.status_label);
      return `
        <div class="card-row">
          <div class="card-title">${esc(r.title)}${r.is_must_achieve ? ' <span class="badge b-must">must</span>' : ''}${r.is_deep_work ? ' <span class="badge b-deep">deep</span>' : ''}</div>
          <div class="card-arrow">›</div>
        </div>
        <div class="card-meta">
          ${statusBadge(r.statuses?.status_label)}
          ${r.priority ? priBadge(r.priority) : ''}
          ${r.promise_date ? '<span class="card-sub ' + (overdue ? 'overdue-date' : '') + '">' + r.promise_date + '</span>' : ''}
          ${r.themes?.title ? '<span class="card-sub">' + esc(r.themes.title) + '</span>' : ''}
        </div>`;
    },
    filter(r, f) {
      if (f.status?.length && r.statuses?.status_label && !f.status.includes(r.statuses?.status_label)) return false;
      if (f.theme && r.theme_id !== f.theme) return false;
      if (f.q && !r.title?.toLowerCase().includes(f.q)) return false;
      return true;
    },
  },
  themes: {
    endpoint: 'themes?select=theme_id,title,description,domain,status_id,statuses(status_label)&order=title.asc',
    idKey: 'theme_id',
    stats(d) {
      return [
        { label: 'Total', value: d.length, cls: '' },
        { label: 'Active', value: d.filter(r => r.statuses?.status_label === 'In Progress').length, cls: 'blue' },
        { label: 'Done', value: d.filter(r => r.statuses?.status_label === 'Done').length, cls: 'accent' },
        { label: 'Blocked', value: d.filter(r => r.statuses?.status_label === 'Blocked').length, cls: 'red' },
      ];
    },
    card(r) {
      return `
        <div class="card-row">
          <div class="card-title">${esc(r.title)}</div>
          <div class="card-arrow">›</div>
        </div>
        <div class="card-meta">
          ${statusBadge(r.statuses?.status_label)}
          ${r.domain ? '<span class="card-sub">' + r.domain + '</span>' : ''}
        </div>`;
    },
    filter(r, f) {
      if (f.q && !r.title?.toLowerCase().includes(f.q)) return false;
      return true;
    },
  },
  epics: {
    endpoint: 'roadmap_items?select=roadmap_item_id,title,description,domain,target_date,status_id,theme_id,owner_id,statuses(status_label),themes(title),people!roadmap_items_owner_id_fkey(full_name)&order=title.asc',
    idKey: 'roadmap_item_id',
    stats(d) {
      const today = new Date().toISOString().substring(0,10);
      return [
        { label: 'Total', value: d.length, cls: '' },
        { label: 'Active', value: d.filter(r => r.statuses?.status_label === 'In Progress').length, cls: 'blue' },
        { label: 'Done', value: d.filter(r => r.statuses?.status_label === 'Done').length, cls: 'accent' },
        { label: 'Overdue', value: d.filter(r => r.target_date && r.target_date < today && !DONE.includes(r.statuses?.status_label)).length, cls: 'red' },
      ];
    },
    card(r) {
      return `
        <div class="card-row">
          <div class="card-title">${esc(r.title)}</div>
          <div class="card-arrow">›</div>
        </div>
        <div class="card-meta">
          ${statusBadge(r.statuses?.status_label)}
          ${r.themes?.title ? '<span class="card-sub">' + esc(r.themes.title) + '</span>' : ''}
          ${r.target_date ? '<span class="card-sub">' + r.target_date + '</span>' : ''}
        </div>`;
    },
    filter(r, f) {
      if (f.q && !r.title?.toLowerCase().includes(f.q)) return false;
      return true;
    },
  },
  commitments: {
    endpoint: 'commitments?select=commitment_id,description,promised_date,status,direction,person_id,task_id,people(full_name),tasks(title)&order=promised_date.asc.nullslast',
    idKey: 'commitment_id',
    stats(d) {
      const today = new Date().toISOString().substring(0,10);
      return [
        { label: 'Total', value: d.length, cls: '' },
        { label: 'Outstanding', value: d.filter(r => r.status === 'Outstanding').length, cls: 'amber' },
        { label: 'Overdue', value: d.filter(r => r.promised_date && r.promised_date < today && r.status === 'Outstanding').length, cls: 'red' },
        { label: 'Inbound', value: d.filter(r => r.direction === 'inbound').length, cls: 'blue' },
      ];
    },
    card(r) {
      const today = new Date().toISOString().substring(0,10);
      const overdue = r.promised_date && r.promised_date < today && r.status === 'Outstanding';
      return `
        <div class="card-row">
          <div class="card-title">${esc(r.description)}</div>
          <div class="card-arrow">›</div>
        </div>
        <div class="card-meta">
          ${r.status === 'Outstanding' ? '<span class="badge b-amber">outstanding</span>' : r.status === 'Delivered' ? '<span class="badge b-green">delivered</span>' : '<span class="badge b-purple">renegotiated</span>'}
          ${r.direction === 'inbound' ? '<span class="badge b-blue">inbound</span>' : '<span class="badge b-gray">outbound</span>'}
          ${r.people?.full_name ? '<span class="card-sub">' + esc(r.people.full_name) + '</span>' : ''}
          ${r.promised_date ? '<span class="card-sub ' + (overdue ? 'overdue-date' : '') + '">' + r.promised_date + '</span>' : ''}
        </div>`;
    },
    filter(r, f) {
      if (f.status?.length && !f.status.includes(r.status)) return false;
      if (f.q && !(r.description || '').toLowerCase().includes(f.q)) return false;
      return true;
    },
  },
  people: {
    endpoint: 'people?select=person_id,full_name,job_title,company,work_email,mobile,is_stakeholder,is_active,person_type_id,relationship_note,person_types(description)&order=full_name.asc',
    idKey: 'person_id',
    stats(d) {
      return [
        { label: 'Total', value: d.length, cls: '' },
        { label: 'Stakeholders', value: d.filter(r => r.is_stakeholder).length, cls: 'blue' },
        { label: 'Active', value: d.filter(r => r.is_active).length, cls: 'accent' },
        { label: 'Companies', value: new Set(d.filter(r => r.company).map(r => r.company)).size, cls: '' },
      ];
    },
    card(r) {
      return `
        <div class="card-row">
          <div class="card-title">${esc(r.full_name)}</div>
          <div class="card-arrow">›</div>
        </div>
        <div class="card-meta">
          ${r.job_title ? '<span class="card-sub">' + esc(r.job_title) + '</span>' : ''}
          ${r.company ? '<span class="card-sub">' + esc(r.company) + '</span>' : ''}
          ${r.is_stakeholder ? '<span class="badge b-blue">stakeholder</span>' : ''}
        </div>`;
    },
    filter(r, f) {
      if (f.q && !r.full_name?.toLowerCase().includes(f.q) && !(r.company || '').toLowerCase().includes(f.q)) return false;
      return true;
    },
  },
};

function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function capFirst(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

function statusBadge(label) {
  const map = { 'Done': 'b-green', 'In Progress': 'b-blue', 'Blocked': 'b-red', 'Not Started': 'b-gray', 'Outstanding': 'b-amber', 'Delivered': 'b-green', 'Renegotiated': 'b-purple' };
  return label ? '<span class="badge ' + (map[label] || 'b-gray') + '">' + label + '</span>' : '';
}
function priBadge(p) {
  const m = { High: 'b-red', Medium: 'b-amber', Low: 'b-gray' };
  return '<span class="badge ' + (m[p] || 'b-gray') + '">' + p + '</span>';
}

function renderTabBar() {
  document.getElementById('tabbar').innerHTML = TABS.map(t =>
    '<button class="tab-item ' + (t.id === activeTab ? 'active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' +
    '<span class="tab-icon">' + t.icon + '</span>' +
    '<span class="tab-label">' + t.label + '</span></button>'
  ).join('');
}

function renderStats(data) {
  const stats = TAB_DEF[activeTab].stats(data);
  document.getElementById('stats-row').innerHTML = stats.map(s =>
    '<div class="stat"><div class="stat-label">' + s.label + '</div><div class="stat-value ' + s.cls + '">' + s.value + '</div></div>'
  ).join('');
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const def = TAB_DEF[activeTab];
  const filtered = allRows.filter(r => def.filter(r, { q, ...activeFilters }));
  renderList(filtered);
  renderFilterBar();
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  const pills = [];
  if (activeFilters.status.length) pills.push(...activeFilters.status.map(s => s));
  if (activeFilters.theme) pills.push(ref.themes.find(t => t.theme_id === activeFilters.theme)?.title || '');
  if (activeFilters.owner) pills.push(ref.people.find(p => p.person_id === activeFilters.owner)?.full_name || '');
  if (activeFilters.priority) pills.push(activeFilters.priority);
  if (pills.length === 0) { bar.style.display = 'none'; document.getElementById('filter-btn').style.background = 'var(--bg3)'; document.getElementById('filter-btn').style.color = 'var(--text2)'; return; }
  bar.style.display = 'flex';
  document.getElementById('filter-btn').style.background = 'var(--accent-dim)';
  document.getElementById('filter-btn').style.color = 'var(--accent)';
  bar.innerHTML = '<span class="filter-pill active" onclick="resetFilters()">✕ clear</span>' + pills.map(p => '<span class="filter-pill active">' + esc(p) + '</span>').join('');
}

function resetFilters() {
  activeFilters = { status: [], theme: null, owner: null, priority: null };
  applyFilters();
}

function openFilters() {
  const statusList = activeTab === 'commitments'
    ? ['Outstanding','Delivered','Renegotiated']
    : ref.statuses.map(s => s.status_label);

  let html = '<div class="filter-section"><div class="filter-section-label">Status</div><div class="filter-chips">';
  statusList.forEach(s => {
    const sel = activeFilters.status.includes(s) ? 'selected' : '';
    html += '<div class="filter-chip ' + sel + '" onclick="toggleStatusFilter(this)" data-val="' + s.replace(/"/g, '&quot;') + '">' + s + '</div>';
  });
  html += '</div></div>';

  // Theme filter for tasks, themes, epics (not commitments or people)
  if (['tasks','themes','epics'].includes(activeTab)) {
    html += '<div class="filter-section"><div class="filter-section-label">Theme</div><div class="filter-chips">';
    ref.themes.forEach(t => {
      const sel = activeFilters.theme === t.theme_id ? 'selected' : '';
      html += '<div class="filter-chip ' + sel + '" onclick="setThemeFilter(' + t.theme_id + ')">' + esc(t.title) + '</div>';
    });
    html += '</div></div>';
  }

  document.getElementById('sheet-title').textContent = 'Filter';
  document.getElementById('sheet-body').innerHTML = html;
  document.getElementById('sheet-footer').innerHTML = '<button class="filter-reset" onclick="resetFilters();closeSheet()">Reset</button><button class="filter-apply" onclick="applyFilters();closeSheet()">Apply</button>';
  openSheet();
}

function toggleStatusFilter(el) {
  const s = el.dataset.val;
  const idx = activeFilters.status.indexOf(s);
  if (idx === -1) activeFilters.status.push(s);
  else activeFilters.status.splice(idx, 1);
  el.classList.toggle('selected');
}

function setThemeFilter(id) {
  activeFilters.theme = activeFilters.theme === id ? null : id;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('selected'));
  reopenFilters();
}

function setOwnerFilter(id) {
  activeFilters.owner = activeFilters.owner === id ? null : id;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('selected'));
  reopenFilters();
}

function setPriorityFilter(p) {
  activeFilters.priority = activeFilters.priority === p ? null : p;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('selected'));
  reopenFilters();
}

function reopenFilters() {
  closeSheet();
  setTimeout(() => openFilters(), 50);
}

function renderList(data) {
  const def = TAB_DEF[activeTab];
  if (!data || data.length === 0) {
    document.getElementById('list-wrap').innerHTML = '<div class="empty-state">No records found.</div>';
    return;
  }
  document.getElementById('list-wrap').innerHTML = data.map(r => {
    const id = r[def.idKey];
    return '<div class="card" onclick="openEdit(' + id + ')">' + def.card(r) + '</div>';
  }).join('');
}

async function loadTab() {
  document.getElementById('list-wrap').innerHTML = '<div class="loading">Loading...</div>';
  const def = TAB_DEF[activeTab];
  try {
    allRows = await api(def.endpoint) || [];
    renderStats(allRows);
    applyFilters();
  } catch(e) {
    document.getElementById('list-wrap').innerHTML = '<div class="empty-state">Error: ' + e.message + '</div>';
  }
}

async function switchTab(tab) {
  activeFilters = { status: [], theme: null, owner: null, priority: null };
  activeTab = tab;
  document.getElementById('tab-title').textContent = TABS.find(t => t.id === tab)?.label || tab;
  document.getElementById('search-input').value = '';
  renderTabBar();
  await loadTab();
}

/* ---- Forms ---- */
function selOpts(options, selected) {
  return options.map(o => '<option value="' + o.v + '"' + (String(o.v) === String(selected) ? ' selected' : '') + '>' + esc(o.l) + '</option>').join('');
}

function buildForm(tab, r) {
  const statusOpts = '<option value=""></option>' + selOpts(ref.statuses.map(s => ({v: s.status_id, l: s.status_label})), r?.status_id);
  const themeOpts  = '<option value=""></option>' + selOpts(ref.themes.map(t => ({v: t.theme_id, l: t.title})), r?.theme_id);
  const peopleOpts = '<option value=""></option>' + selOpts(ref.people.map(p => ({v: p.person_id, l: p.full_name})), r?.person_id || r?.owner_id);
  const epicOpts   = '<option value=""></option>' + selOpts(ref.epics.map(e => ({v: e.roadmap_item_id, l: e.title})), r?.epic_id);

  if (tab === 'tasks') return `
    <div class="form-row"><label>Title *</label><input id="ff-title" value="${esc(r?.title ? capFirst(r.title) : '')}"></div>
    <div class="form-row"><label>Description</label><textarea id="ff-desc">${esc(r?.description || '')}</textarea></div>
    <div class="form-grid">
      <div class="form-row"><label>Status</label><div class="select-arrow"><select id="ff-status">${statusOpts}</select></div></div>
      <div class="form-row"><label>Priority</label><div class="select-arrow"><select id="ff-priority"><option value=""></option><option ${r?.priority==='High'?'selected':''}>High</option><option ${r?.priority==='Medium'?'selected':''}>Medium</option><option ${r?.priority==='Low'?'selected':''}>Low</option></select></div></div>
    </div>
    <div class="form-row"><label>Theme</label><div class="select-arrow"><select id="ff-theme">${themeOpts}</select></div></div>
    <div class="form-row"><label>Epic</label><div class="select-arrow"><select id="ff-epic">${epicOpts}</select></div></div>
    <div class="form-row"><label>Owner</label><div class="select-arrow"><select id="ff-owner"><option value=""></option>${selOpts(ref.people.map(p=>({v:p.person_id,l:p.full_name})),r?.owner_id)}</select></div></div>
    <div class="form-row"><label>Due date</label><input id="ff-due" type="date" value="${r?.promise_date || ''}"></div>
    <div class="form-row"><div class="checkbox-row"><input type="checkbox" id="ff-must" ${r?.is_must_achieve?'checked':''}><label for="ff-must">Must achieve</label></div></div>
    <div class="form-row"><div class="checkbox-row"><input type="checkbox" id="ff-deep" ${r?.is_deep_work?'checked':''}><label for="ff-deep">Deep work</label></div></div>`;

  if (tab === 'themes') return `
    <div class="form-row"><label>Title *</label><input id="ff-title" value="${esc(r?.title ? capFirst(r.title) : '')}"></div>
    <div class="form-row"><label>Description</label><textarea id="ff-desc">${esc(r?.description || '')}</textarea></div>
    <div class="form-grid">
      <div class="form-row"><label>Domain</label><div class="select-arrow"><select id="ff-domain"><option value=""></option><option ${r?.domain==='Business'?'selected':''}>Business</option><option ${r?.domain==='Personal'?'selected':''}>Personal</option></select></div></div>
      <div class="form-row"><label>Status</label><div class="select-arrow"><select id="ff-status">${statusOpts}</select></div></div>
    </div>`;

  if (tab === 'epics') return `
    <div class="form-row"><label>Title *</label><input id="ff-title" value="${esc(r?.title ? capFirst(r.title) : '')}"></div>
    <div class="form-row"><label>Description</label><textarea id="ff-desc">${esc(r?.description || '')}</textarea></div>
    <div class="form-row"><label>Theme</label><div class="select-arrow"><select id="ff-theme">${themeOpts}</select></div></div>
    <div class="form-row"><label>Owner</label><div class="select-arrow"><select id="ff-owner">${'<option value=""></option>' + selOpts(ref.people.map(p=>({v:p.person_id,l:p.full_name})),r?.owner_id)}</select></div></div>
    <div class="form-grid">
      <div class="form-row"><label>Domain</label><div class="select-arrow"><select id="ff-domain"><option value=""></option><option ${r?.domain==='Business'?'selected':''}>Business</option><option ${r?.domain==='Personal'?'selected':''}>Personal</option></select></div></div>
      <div class="form-row"><label>Target date</label><input id="ff-target" type="date" value="${r?.target_date || ''}"></div>
    </div>
    <div class="form-row"><label>Status</label><div class="select-arrow"><select id="ff-status">${statusOpts}</select></div></div>`;

  if (tab === 'commitments') return `
    <div class="form-row"><label>Description *</label><textarea id="ff-desc">${esc(r?.description || '')}</textarea></div>
    <div class="form-row"><label>Person</label><div class="select-arrow"><select id="ff-person">${peopleOpts}</select></div></div>
    <div class="form-grid">
      <div class="form-row"><label>Direction</label><div class="select-arrow"><select id="ff-direction"><option value="outbound" ${r?.direction!=='inbound'?'selected':''}>Outbound</option><option value="inbound" ${r?.direction==='inbound'?'selected':''}>Inbound</option></select></div></div>
      <div class="form-row"><label>Due date</label><input id="ff-due" type="date" value="${r?.promised_date || ''}"></div>
    </div>
    <div class="form-row"><label>Status</label><div class="select-arrow"><select id="ff-status-c"><option value="Outstanding" ${(r?.status||'Outstanding')==='Outstanding'?'selected':''}>Outstanding</option><option value="Delivered" ${r?.status==='Delivered'?'selected':''}>Delivered</option><option value="Renegotiated" ${r?.status==='Renegotiated'?'selected':''}>Renegotiated</option></select></div></div>`;

  if (tab === 'people') {
    const ptOpts = '<option value=""></option>' + selOpts(ref.personTypes.map(pt => ({v: pt.person_type_id, l: pt.description})), r?.person_type_id);
    return `
    <div class="form-row"><label>Full name *</label><input id="ff-title" value="${esc(r?.full_name ? capFirst(r.full_name) : '')}"></div>
    <div class="form-grid">
      <div class="form-row"><label>Job title</label><input id="ff-job-title" value="${esc(r?.job_title || '')}"></div>
      <div class="form-row"><label>Company</label><input id="ff-company" value="${esc(r?.company || '')}"></div>
    </div>
    <div class="form-row"><label>Person type</label><div class="select-arrow"><select id="ff-person-type">${ptOpts}</select></div></div>
    <div class="form-row"><label>Work email</label><input id="ff-work-email" type="email" value="${esc(r?.work_email || '')}"></div>
    <div class="form-row"><label>Mobile</label><input id="ff-mobile" type="tel" value="${esc(r?.mobile || '')}"></div>
    <div class="form-row"><label>Relationship note</label><textarea id="ff-rel-note">${esc(r?.relationship_note || '')}</textarea></div>
    <div class="form-row"><div class="checkbox-row"><input type="checkbox" id="ff-stakeholder" ${r?.is_stakeholder?'checked':''}><label for="ff-stakeholder">Is stakeholder</label></div></div>
    <div class="form-row"><div class="checkbox-row"><input type="checkbox" id="ff-active" ${r?.is_active!==false?'checked':''}><label for="ff-active">Is active</label></div></div>`;
  }
}

function openAdd() {
  editingId = null;
  const label = TABS.find(t => t.id === activeTab)?.label || activeTab;
  document.getElementById('sheet-title').textContent = 'Add ' + label.toLowerCase().slice(0,-1);
  document.getElementById('sheet-body').innerHTML = buildForm(activeTab, null) + '<div class="form-error" id="form-error"></div>';
  document.getElementById('sheet-footer').innerHTML = '<button class="btn-cancel" onclick="closeSheet()">Cancel</button><button class="btn-save" onclick="saveRecord()">Save</button>';
  openSheet();
  setFormVals(null);
}

function openEdit(id) {
  const def = TAB_DEF[activeTab];
  const r = allRows.find(x => x[def.idKey] === id);
  if (!r) return;
  editingId = id;
  const label = TABS.find(t => t.id === activeTab)?.label || activeTab;
  document.getElementById('sheet-title').textContent = 'Edit ' + label.toLowerCase().slice(0,-1);
  document.getElementById('sheet-body').innerHTML = buildForm(activeTab, r) + '<div class="form-error" id="form-error"></div>';
  document.getElementById('sheet-footer').innerHTML = '<button class="btn-delete-sheet" onclick="confirmDelete(' + id + ')">Delete</button><button class="btn-cancel" onclick="closeSheet()">Cancel</button><button class="btn-save" onclick="saveRecord()">Save</button>';
  openSheet();
  setFormVals(r);
}

function setFormVals(r) {
  if (!r) return;
  const sv = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = String(val); };
  const sc = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
  if (activeTab === 'tasks') {
    sv('ff-status', r.status_id); sv('ff-theme', r.theme_id); sv('ff-epic', r.epic_id);
    sv('ff-owner', r.owner_id); sv('ff-priority', r.priority);
    sc('ff-must', r.is_must_achieve); sc('ff-deep', r.is_deep_work);
  } else if (activeTab === 'themes') {
    sv('ff-status', r.status_id); sv('ff-domain', r.domain);
  } else if (activeTab === 'epics') {
    sv('ff-status', r.status_id); sv('ff-theme', r.theme_id); sv('ff-owner', r.owner_id); sv('ff-domain', r.domain);
  } else if (activeTab === 'commitments') {
    sv('ff-person', r.person_id); sv('ff-direction', r.direction); sv('ff-status-c', r.status);
  } else if (activeTab === 'people') {
    sc('ff-stakeholder', r.is_stakeholder); sc('ff-active', r.is_active !== false);
  }
}

function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
  setTimeout(() => { const first = document.querySelector('#sheet-body input, #sheet-body textarea'); if (first) first.focus(); }, 350);
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
  editingId = null;
}

async function confirmDelete(id) {
  if (!confirm('Delete this record?')) return;
  const tables = { themes: 'themes', epics: 'roadmap_items', tasks: 'tasks', commitments: 'commitments', people: 'people' };
  const idKeys = { themes: 'theme_id', epics: 'roadmap_item_id', tasks: 'task_id', commitments: 'commitment_id', people: 'person_id' };
  await api(tables[activeTab] + '?' + idKeys[activeTab] + '=eq.' + id, { method: 'DELETE' });
  closeSheet();
  loadTab();
}

async function saveRecord() {
  const v = id => { const el = document.getElementById(id); return el ? (el.value || null) : null; };
  const vb = id => { const el = document.getElementById(id); return el ? el.checked : false; };
  const vi = id => { const val = v(id); return val ? parseInt(val) : null; };
  const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
  let body = {};

  if (activeTab === 'tasks') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Title is required.'; return; }
    body = { title: cap(v('ff-title')), description: v('ff-desc'), theme_id: vi('ff-theme'), epic_id: vi('ff-epic'), owner_id: vi('ff-owner'), priority: v('ff-priority'), promise_date: v('ff-due'), status_id: vi('ff-status') || (editingId ? null : 1), is_must_achieve: vb('ff-must'), is_deep_work: vb('ff-deep') };
  } else if (activeTab === 'themes') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Title is required.'; return; }
    body = { title: cap(v('ff-title')), description: v('ff-desc'), domain: v('ff-domain'), status_id: vi('ff-status') };
  } else if (activeTab === 'epics') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Title is required.'; return; }
    body = { title: cap(v('ff-title')), description: v('ff-desc'), theme_id: vi('ff-theme'), owner_id: vi('ff-owner'), domain: v('ff-domain'), target_date: v('ff-target'), status_id: vi('ff-status') };
  } else if (activeTab === 'commitments') {
    if (!v('ff-desc')) { document.getElementById('form-error').textContent = 'Description is required.'; return; }
    body = { description: v('ff-desc'), person_id: vi('ff-person'), direction: v('ff-direction'), promised_date: v('ff-due'), status: v('ff-status-c') };
  } else if (activeTab === 'people') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Name is required.'; return; }
    body = { full_name: cap(v('ff-title')), job_title: v('ff-job-title'), company: v('ff-company'), person_type_id: vi('ff-person-type'), work_email: v('ff-work-email'), mobile: v('ff-mobile'), relationship_note: v('ff-rel-note'), is_stakeholder: vb('ff-stakeholder'), is_active: vb('ff-active') };
  }

  const tables = { themes: 'themes', epics: 'roadmap_items', tasks: 'tasks', commitments: 'commitments', people: 'people' };
  const idKeys = { themes: 'theme_id', epics: 'roadmap_item_id', tasks: 'task_id', commitments: 'commitment_id', people: 'person_id' };

  const ALWAYS = {
    tasks: ['title','description','priority','promise_date','is_must_achieve','is_deep_work'],
    themes: ['title','description','domain'], epics: ['title','description','domain','target_date'],
    commitments: ['description','direction','promised_date','status'],
    people: ['full_name','job_title','company','person_type_id','work_email','mobile','relationship_note','is_stakeholder','is_active'],
  };

  try {
    if (editingId) {
      const keep = new Set(ALWAYS[activeTab] || []);
      const patch = Object.fromEntries(Object.entries(body).filter(([k, val]) => keep.has(k) || (val !== null && val !== undefined)));
      if (activeTab === 'tasks') { patch.is_must_achieve = vb('ff-must'); patch.is_deep_work = vb('ff-deep'); }
      await api(tables[activeTab] + '?' + idKeys[activeTab] + '=eq.' + editingId, { method: 'PATCH', body: patch, prefer: 'return=minimal' });
    } else {
      await api(tables[activeTab], { method: 'POST', body, prefer: 'return=minimal' });
    }
    closeSheet();
    loadTab();
  } catch(e) {
    document.getElementById('form-error').textContent = 'Save failed: ' + e.message;
  }
}

async function init() {
  if (!checkAuth()) return;
  try {
    await loadRef();
  } catch(e) {
    document.getElementById('list-wrap').innerHTML = '<div class="empty-state">Failed to load ref data: ' + e.message + '</div>';
    return;
  }
  renderTabBar();
  document.getElementById('tab-title').textContent = TABS.find(t => t.id === activeTab)?.label || activeTab;
  try {
    await loadTab();
  } catch(e) {
    document.getElementById('list-wrap').innerHTML = '<div class="empty-state">Failed to load: ' + e.message + '</div>';
  }
}

init();
</script>
