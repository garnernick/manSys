<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ManSys — Calendar</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ManSys Cal">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #555;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.08);
  --blue: #4a9eff;
  --red: #ff5f5f;
  --amber: #ffb347;
  --green: #4dff91;
  --purple: #b47fff;
  --teal: #2dd4bf;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --topbar-h: 48px;
  --datebar-h: 44px;
  --time-col-w: 44px;
  --hour-h: 56px;
  --start-hour: 7;
  --end-hour: 21;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; overflow: hidden; }

/* Auth */
#auth-gate { display: none; position: fixed; inset: 0; background: var(--bg); align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 999; }

/* App */
#app { display: none; height: 100dvh; flex-direction: column; }

/* Topbar */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: calc(env(safe-area-inset-top, 0px) + 8px) 14px 8px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; }
.date-display { flex: 1; text-align: center; }
.date-day { font-family: var(--mono); font-size: 13px; color: var(--text); }
.date-sub { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 1px; }
.icon-btn { width: 34px; height: 34px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; color: var(--text2); flex-shrink: 0; }
.icon-btn.accent { background: var(--accent-dim); color: var(--accent); border-color: rgba(200,255,0,0.3); }

/* Nav row */
.nav-row {
  display: flex; align-items: center; gap: 0;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; height: var(--datebar-h);
}
.nav-arrow { width: 40px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 18px; flex-shrink: 0; border: none; background: transparent; }
.nav-arrow:active { background: var(--bg3); }
.today-btn { font-family: var(--mono); font-size: 10px; color: var(--text3); padding: 4px 10px; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; background: transparent; }
.today-btn:active { background: var(--bg3); }
.nav-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* Calendar grid */
.cal-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Column headers */
.col-headers { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg2); }
.col-time-spacer { width: var(--time-col-w); flex-shrink: 0; }
.col-header { flex: 1; padding: 6px 4px; text-align: center; border-left: 1px solid var(--border); }
.col-header-name { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-header-dot { width: 6px; height: 6px; border-radius: 50%; margin: 3px auto 0; }

/* Scrollable grid */
.grid-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
.grid-inner { display: flex; position: relative; }

/* Time column */
.time-col { width: var(--time-col-w); flex-shrink: 0; }
.time-slot { height: var(--hour-h); display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 6px; padding-top: 2px; }
.time-label { font-family: var(--mono); font-size: 9px; color: var(--text3); white-space: nowrap; }

/* Event columns */
.event-cols { flex: 1; display: flex; position: relative; }
.event-col { flex: 1; border-left: 1px solid var(--border); position: relative; }
.hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid var(--border); pointer-events: none; }
.half-line { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--border); opacity: 0.4; pointer-events: none; }

/* Current time indicator */
.now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--red); z-index: 10; pointer-events: none; }
.now-dot { position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--red); }

/* Events */
.event-block {
  position: absolute; left: 2px; right: 2px;
  border-radius: 5px; padding: 3px 5px;
  cursor: pointer; overflow: hidden;
  border-left: 3px solid transparent;
  transition: opacity 0.1s;
}
.event-block:active { opacity: 0.75; }
.event-title { font-size: 10px; font-weight: 500; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-time { font-family: var(--mono); font-size: 9px; opacity: 0.75; margin-top: 1px; white-space: nowrap; }

/* All day strip */
.allday-strip { border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; min-height: 0; background: var(--bg2); }
.allday-time { width: var(--time-col-w); flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.allday-label { font-family: var(--mono); font-size: 8px; color: var(--text3); }
.allday-cols { flex: 1; display: flex; }
.allday-col { flex: 1; border-left: 1px solid var(--border); padding: 3px 2px; min-height: 8px; }
.allday-event { font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Event detail sheet */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: 16px 16px 0 0; border-top: 1px solid var(--border2); z-index: 101; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); max-height: 70vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom, 20px); }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 8px; }
.sheet-content { padding: 0 20px 20px; }
.detail-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
.detail-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.detail-icon { font-size: 13px; color: var(--text3); flex-shrink: 0; width: 18px; margin-top: 1px; }
.detail-text { font-size: 13px; color: var(--text2); line-height: 1.4; }
.detail-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-size: 10px; margin-bottom: 10px; }

/* Settings sheet */
.settings-body { padding: 16px 20px; padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 16px); }
.settings-section { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; margin-top: 16px; }
.settings-section:first-child { margin-top: 0; }
.cal-option { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; margin-bottom: 6px; cursor: pointer; }
.cal-option-left { display: flex; align-items: center; gap: 10px; }
.cal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cal-name { font-size: 13px; color: var(--text); }
.cal-check { font-size: 16px; color: var(--accent); }

/* Date picker */
input[type=date] { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 13px; border-radius: 8px; padding: 8px 12px; outline: none; width: 100%; -webkit-appearance: none; }
input[type=date]:focus { border-color: var(--accent); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 11px; }

::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="auth-gate" style="display:flex">
  <p style="font-family:var(--mono);color:var(--red);font-size:12px">Checking access...</p>
</div>

<div id="app" style="display:none;flex-direction:column;height:100dvh">
  <div class="topbar">
    <div class="brand" onclick="window.location.href='dashboard-mobile.html?token=fdb44961c5a73eb588b68e9614f58671'" style="cursor:pointer">■ CAL</div>
    <div class="date-display">
      <div class="date-day" id="date-day">Loading...</div>
      <div class="date-sub" id="date-sub"></div>
    </div>
    <button class="icon-btn" id="settings-btn" onclick="openSettings()" title="Calendar settings">⚙</button>
  </div>

  <div class="nav-row">
    <button class="nav-arrow" onclick="shiftDay(-1)">‹</button>
    <div class="nav-center">
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
    <button class="nav-arrow" onclick="shiftDay(1)">›</button>
  </div>

  <!-- Column headers -->
  <div class="col-headers" id="col-headers"></div>

  <!-- All day events -->
  <div class="allday-strip" id="allday-strip" style="display:none"></div>

  <!-- Scrollable grid -->
  <div class="cal-wrap">
    <div class="grid-scroll" id="grid-scroll">
      <div class="grid-inner" id="grid-inner">
        <div class="time-col" id="time-col"></div>
        <div class="event-cols" id="event-cols"></div>
      </div>
    </div>
  </div>
</div>

<!-- Hidden date input -->
<input type="date" id="date-input" style="position:fixed;opacity:0;pointer-events:none;top:0;left:0" onchange="onDatePicked()">

<!-- Event detail sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content" id="sheet-content"></div>
</div>

<!-- Settings sheet -->
<div class="sheet-overlay" id="settings-overlay" onclick="closeSettings()"></div>
<div class="sheet" id="settings-sheet">
  <div class="sheet-handle"></div>
  <div class="settings-body" id="settings-body"></div>
</div>

<script>
const ACCESS_TOKEN = 'fdb44961c5a73eb588b68e9614f58671';
const SUPABASE_URL = 'https://dglotzmioswcmhfttcqx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbG90em1pb3N3Y21oZnR0Y3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTE3MzgsImV4cCI6MjA4ODU2NzczOH0.lF_8yxfnP50UpiMKCW3aQxq8HukVZ5ibRqOp-RwFvpQ';

const HOUR_H = 56; // px per hour
const START_H = 7;
const END_H = 21;
const TOTAL_HOURS = END_H - START_H;

// Calendar source colours
const CAL_COLOURS = {
  'Nick - Google':  { bg: 'rgba(74,158,255,0.15)',  border: '#4a9eff', dot: '#4a9eff'  },
  'Nick - Outlook': { bg: 'rgba(180,127,255,0.15)', border: '#b47fff', dot: '#b47fff' },
  'InHealthWork':   { bg: 'rgba(45,212,191,0.15)',  border: '#2dd4bf', dot: '#2dd4bf' },
};
const DEFAULT_COL = { bg: 'rgba(136,136,136,0.15)', border: '#888', dot: '#888' };

function calColour(source) {
  return CAL_COLOURS[source] || DEFAULT_COL;
}

async function api(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

function checkAuth() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('token') !== ACCESS_TOKEN) {
    document.getElementById('auth-gate').innerHTML = '<p style="font-family:var(--mono);color:var(--red);font-size:13px">✕ Access denied</p>';
    return false;
  }
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  return true;
}

// State
const _n = new Date();
let currentDate = new Date(_n.getFullYear(), _n.getMonth(), _n.getDate(), 0, 0, 0, 0);
let allSources = [];
let visibleSources = [];
let dayEvents = [];

// ---- Date helpers ----
function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + day;
}
function fmtTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
function fmtDuration(start, end) {
  if (!start || !end) return '';
  const mins = Math.round((new Date(end) - new Date(start)) / 60000);
  if (mins < 60) return mins + 'm';
  const h = Math.floor(mins/60), m = mins % 60;
  return h + 'h' + (m ? m + 'm' : '');
}

function updateDateHeader() {
  const _tdn = new Date(); const today = new Date(_tdn.getFullYear(), _tdn.getMonth(), _tdn.getDate(), 0,0,0,0);
  const isToday = currentDate.getTime() === today.getTime();
  const dayName = currentDate.toLocaleDateString('en-GB', { weekday: 'long' });
  const dateFmt = currentDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('date-day').textContent = (isToday ? 'Today — ' : '') + dayName;
  document.getElementById('date-sub').textContent = dateFmt;
}

// ---- Load sources ----
async function loadSources() {
  const rows = await api('calendar_events?select=calendar_source&is_cancelled=eq.false&limit=200');
  const seen = new Set();
  rows.forEach(r => { if (r.calendar_source) seen.add(r.calendar_source); });
  allSources = Array.from(seen).sort();
  // Default: show all
  if (visibleSources.length === 0) visibleSources = [...allSources];
}

// ---- Load day events ----
async function loadDay() {
  const d = isoDate(currentDate);
  const nextD = new Date(currentDate); nextD.setDate(nextD.getDate()+1);
  const nd = isoDate(nextD);

  // Fetch timed events starting today + ongoing multi-day events
  const [timed, ongoing] = await Promise.all([
    api('calendar_events?select=event_id,title,start_at,end_at,location,description,calendar_source,is_cancelled&is_cancelled=eq.false&start_at=gte.' + d + 'T00:00:00&start_at=lt.' + nd + 'T00:00:00&order=start_at.asc'),
    api('calendar_events?select=event_id,title,start_at,end_at,location,description,calendar_source,is_cancelled&is_cancelled=eq.false&start_at=lt.' + d + 'T00:00:00&end_at=gt.' + d + 'T23:59:59&order=start_at.asc'),
  ]);

  dayEvents = [...timed, ...ongoing];
  renderGrid();
}

// ---- Render ----
function renderColHeaders() {
  const cols = visibleSources;
  let html = '<div class="col-time-spacer"></div>';
  cols.forEach(src => {
    const c = calColour(src);
    const shortName = src.replace('Nick - ', '').replace('InHealth', 'InHealth');
    html += '<div class="col-header"><div class="col-header-name">' + shortName + '</div><div class="col-header-dot" style="background:' + c.dot + '"></div></div>';
  });
  document.getElementById('col-headers').innerHTML = html;
}

function renderGrid() {
  updateDateHeader();
  renderColHeaders();

  const cols = visibleSources;
  const timeCol = document.getElementById('time-col');
  const eventCols = document.getElementById('event-cols');

  // Build time column
  let timeHtml = '';
  for (let h = START_H; h <= END_H; h++) {
    const label = h < END_H ? String(h).padStart(2,'0') + ':00' : '';
    timeHtml += '<div class="time-slot"><span class="time-label">' + label + '</span></div>';
  }
  timeCol.innerHTML = timeHtml;

  // Split events into all-day and timed
  const allDay = dayEvents.filter(e => isAllDay(e));
  const timed  = dayEvents.filter(e => !isAllDay(e));

  // All-day strip
  const alldayStrip = document.getElementById('allday-strip');
  if (allDay.length > 0) {
    let adHtml = '<div class="allday-time"><span class="allday-label">all day</span></div><div class="allday-cols">';
    cols.forEach(src => {
      const srcEvents = allDay.filter(e => e.calendar_source === src);
      adHtml += '<div class="allday-col">';
      srcEvents.forEach(e => {
        const c = calColour(src);
        adHtml += '<div class="allday-event" style="background:' + c.bg + ';border-left:3px solid ' + c.border + ';color:var(--text)">' + esc(e.title) + '</div>';
      });
      adHtml += '</div>';
    });
    adHtml += '</div>';
    alldayStrip.innerHTML = adHtml;
    alldayStrip.style.display = 'flex';
  } else {
    alldayStrip.style.display = 'none';
  }

  // Event columns
  let colsHtml = '';
  cols.forEach(src => {
    const srcEvents = timed.filter(e => e.calendar_source === src);
    const c = calColour(src);
    colsHtml += '<div class="event-col" id="col-' + src.replace(/\s/g,'_') + '">';

    // Hour and half-hour lines
    for (let h = START_H; h < END_H; h++) {
      const top = (h - START_H) * HOUR_H;
      colsHtml += '<div class="hour-line" style="top:' + top + 'px"></div>';
      colsHtml += '<div class="half-line" style="top:' + (top + HOUR_H/2) + 'px"></div>';
    }

    // Conflict detection: sort by created_at, first = primary, rest = conflict
    const sortedEvents = [...srcEvents].sort((a,b) => {
      if (!a.created_at) return 1;
      if (!b.created_at) return -1;
      return new Date(a.created_at) - new Date(b.created_at);
    });

    // Find which events overlap with an earlier event
    function overlaps(e1, e2) {
      const s1 = eventStartMins(e1), d1 = eventDurationMins(e1);
      const s2 = eventStartMins(e2), d2 = eventDurationMins(e2);
      if (s1 === null || s2 === null) return false;
      return s1 < s2 + d2 && s1 + d1 > s2;
    }

    const conflictSet = new Set();
    for (let i = 0; i < sortedEvents.length; i++) {
      for (let j = 0; j < i; j++) {
        if (overlaps(sortedEvents[i], sortedEvents[j])) {
          conflictSet.add(sortedEvents[i].event_id);
          break;
        }
      }
    }

    // Check if added in last 36 hours
    const now36 = new Date(Date.now() - 36 * 60 * 60 * 1000);

    sortedEvents.forEach(e => {
      const startMins = eventStartMins(e);
      const durationMins = eventDurationMins(e);
      if (startMins === null) return;

      const clampedStart = Math.max(startMins, (START_H * 60));
      const clampedEnd   = Math.min(startMins + durationMins, END_H * 60);
      if (clampedEnd <= clampedStart) return;

      const topPx = ((clampedStart - START_H * 60) / 60) * HOUR_H;
      const heightPx = Math.max(((clampedEnd - clampedStart) / 60) * HOUR_H - 2, 18);
      const startStr = fmtTime(e.start_at);
      const dur = fmtDuration(e.start_at, e.end_at);

      const isConflict = conflictSet.has(e.event_id);
      const isNew = e.created_at && new Date(e.created_at) > now36;

      // Conflict events go on right half, primary on full width
      const left = isConflict ? '50%' : '2px';
      const right = isConflict ? '2px' : '2px';

      let bg, border;
      if (isConflict) {
        bg = 'rgba(255,95,95,0.12)';
        border = 'rgba(255,95,95,0.5)';
      } else if (isNew) {
        bg = 'rgba(200,255,0,0.12)';
        border = 'rgba(200,255,0,0.7)';
      } else {
        bg = c.bg;
        border = c.border;
      }

      colsHtml += '<div class="event-block" style="top:' + topPx + 'px;height:' + heightPx + 'px;left:' + left + ';right:' + right + ';background:' + bg + ';border-left-color:' + border + (isConflict ? ';opacity:0.75' : '') + '" onclick="showEvent(' + e.event_id + ')">';
      colsHtml += '<div class="event-title" style="' + (isConflict ? 'color:var(--red)' : isNew ? 'color:var(--accent)' : '') + '">' + esc(e.title) + '</div>';
      if (heightPx > 28) colsHtml += '<div class="event-time">' + startStr + (dur ? ' · ' + dur : '') + '</div>';
      colsHtml += '</div>';
    });

    colsHtml += '</div>';
  });

  eventCols.innerHTML = colsHtml;

  // Set grid height
  document.getElementById('grid-inner').style.minHeight = (TOTAL_HOURS * HOUR_H) + 'px';

  // Current time line
  renderNowLine();

  // Scroll to current time or 08:00
  scrollToCurrentTime();
}

function renderNowLine() {
  // Remove existing
  document.querySelectorAll('.now-line').forEach(el => el.remove());

  const now = new Date();
  const _td = new Date(); const today = new Date(_td.getFullYear(), _td.getMonth(), _td.getDate(), 0,0,0,0);
  if (currentDate.getTime() !== today.getTime()) return;

  const nowMins = now.getHours() * 60 + now.getMinutes();
  if (nowMins < START_H * 60 || nowMins > END_H * 60) return;

  const topPx = ((nowMins - START_H * 60) / 60) * HOUR_H;
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = topPx + 'px';
  line.innerHTML = '<div class="now-dot"></div>';
  document.getElementById('event-cols').appendChild(line);
}

function scrollToCurrentTime() {
  const now = new Date();
  const _tds = new Date(); const today = new Date(_tds.getFullYear(), _tds.getMonth(), _tds.getDate(), 0,0,0,0);
  let targetHour = currentDate.getTime() === today.getTime()
    ? Math.max(now.getHours() - 1, START_H)
    : START_H + 1;
  const scrollTop = (targetHour - START_H) * HOUR_H;
  document.getElementById('grid-scroll').scrollTop = scrollTop;
}

// ---- Helpers ----
function isAllDay(e) {
  if (!e.start_at) return false;
  const s = new Date(e.start_at);
  const end = e.end_at ? new Date(e.end_at) : null;
  // All-day if starts at midnight and duration is multiple of whole days
  const startMidnight = s.getHours() === 0 && s.getMinutes() === 0;
  if (!end) return startMidnight;
  const durationMs = end - s;
  const wholeDays = durationMs > 0 && durationMs % (24*60*60*1000) === 0;
  return startMidnight && wholeDays;
}

function eventStartMins(e) {
  if (!e.start_at) return null;
  const d = new Date(e.start_at);
  return d.getHours() * 60 + d.getMinutes();
}

function eventDurationMins(e) {
  if (!e.start_at || !e.end_at) return 60;
  const mins = Math.round((new Date(e.end_at) - new Date(e.start_at)) / 60000);
  return Math.max(mins, 15);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- Event detail ----
function showEvent(id) {
  const e = dayEvents.find(ev => ev.event_id === id);
  if (!e) return;
  const c = calColour(e.calendar_source);
  const startStr = fmtTime(e.start_at);
  const endStr = fmtTime(e.end_at);
  const dur = fmtDuration(e.start_at, e.end_at);
  const srcShort = (e.calendar_source || '').replace('Nick - ', '');

  let html = '<div class="detail-badge" style="background:' + c.bg + ';border:1px solid ' + c.border + ';color:var(--text)">' + srcShort + '</div>';
  html += '<div class="detail-title">' + esc(e.title) + '</div>';

  if (!isAllDay(e) && startStr) {
    html += '<div class="detail-row"><div class="detail-icon">🕐</div><div class="detail-text">' + startStr + (endStr ? ' – ' + endStr : '') + (dur ? ' (' + dur + ')' : '') + '</div></div>';
  } else {
    html += '<div class="detail-row"><div class="detail-icon">📅</div><div class="detail-text">All day</div></div>';
  }
  if (e.location) {
    html += '<div class="detail-row"><div class="detail-icon">📍</div><div class="detail-text">' + esc(e.location) + '</div></div>';
  }
  if (e.description) {
    html += '<div class="detail-row"><div class="detail-icon">📋</div><div class="detail-text">' + esc(e.description.substring(0,200)) + (e.description.length > 200 ? '…' : '') + '</div></div>';
  }

  document.getElementById('sheet-content').innerHTML = html;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
}

// ---- Settings ----
function openSettings() {
  let html = '<div class="settings-section">Visible calendars</div>';
  allSources.forEach(src => {
    const c = calColour(src);
    const on = visibleSources.includes(src);
    const shortName = src.replace('Nick - ', '');
    html += '<div class="cal-option" onclick="toggleSource(\'' + src + '\')">';
    html += '<div class="cal-option-left"><div class="cal-dot" style="background:' + c.dot + '"></div><div class="cal-name">' + shortName + '</div></div>';
    html += '<div class="cal-check" id="chk-' + src.replace(/\s/g,'_') + '">' + (on ? '✓' : '') + '</div>';
    html += '</div>';
  });
  html += '<div class="settings-section" style="margin-top:20px">Date</div>';
  html += '<div style="margin-bottom:12px"><div class="cal-option" onclick="window.location.href=\'dashboard-mobile.html?token=fdb44961c5a73eb588b68e9614f58671\'"><div class="cal-option-left"><div class="cal-name" style="color:var(--accent)">← Switch to Dashboard</div></div></div></div>';
  html += '<input type="date" value="' + isoDate(currentDate) + '" onchange="onSettingsDateChange(this.value)">';

  document.getElementById('settings-body').innerHTML = html;
  document.getElementById('settings-sheet').classList.add('open');
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-sheet').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('open');
}

function toggleSource(src) {
  const idx = visibleSources.indexOf(src);
  if (idx === -1) {
    visibleSources.push(src);
  } else {
    if (visibleSources.length === 1) return; // keep at least one
    visibleSources.splice(idx, 1);
  }
  const chk = document.getElementById('chk-' + src.replace(/\s/g,'_'));
  if (chk) chk.textContent = visibleSources.includes(src) ? '✓' : '';
  renderGrid();
}

function onSettingsDateChange(val) {
  if (!val) return;
  const [y,m,d] = val.split('-').map(Number);
  currentDate = new Date(y, m-1, d, 0, 0, 0, 0);
  closeSettings();
  loadDay();
}

// ---- Navigation ----
function shiftDay(n) {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  const d = currentDate.getDate();
  currentDate = new Date(y, m, d + n, 0, 0, 0, 0);
  loadDay();
}

function goToday() {
  const now = new Date();
  currentDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
  loadDay();
}

function openDatePicker() {
  const inp = document.getElementById('date-input');
  inp.value = isoDate(currentDate);
  inp.style.pointerEvents = 'auto';
  inp.click();
  inp.style.pointerEvents = 'none';
}

function onDatePicked() {
  const val = document.getElementById('date-input').value;
  if (!val) return;
  const [y,m,d] = val.split('-').map(Number);
  currentDate = new Date(y, m-1, d, 0, 0, 0, 0);
  loadDay();
}

// ---- Swipe navigation ----
let touchStartX = 0;
document.getElementById('grid-scroll').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('grid-scroll').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) shiftDay(dx < 0 ? 1 : -1);
}, { passive: true });

// ---- Init ----
async function init() {
  if (!checkAuth()) return;
  await loadSources();
  await loadDay();
  // Refresh now line every minute
  setInterval(renderNowLine, 60000);
}

init();
</script>
