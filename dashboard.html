<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.08);
    --accent-dim2: rgba(200,255,0,0.15);
    --blue: #4a9eff;
    --blue-dim: rgba(74,158,255,0.1);
    --red: #ff5f5f;
    --red-dim: rgba(255,95,95,0.1);
    --amber: #ffb347;
    --amber-dim: rgba(255,179,71,0.1);
    --green: #4dff91;
    --green-dim: rgba(77,255,145,0.1);
    --purple: #b47fff;
    --purple-dim: rgba(180,127,255,0.1);
    --radius: 4px;
    --radius2: 6px;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

  /* Auth gate */
  #auth-gate { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; }
  #auth-gate p { font-family: var(--mono); font-size: 12px; color: var(--red); }

  /* Layout */
  #app { display: none; height: 100vh; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 0 20px; height: 48px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .brand { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .nav { display: flex; gap: 2px; flex: 1; }
  .nav-btn { padding: 6px 14px; border: none; background: transparent; color: var(--text2); font-family: var(--font); font-size: 12px; cursor: pointer; border-radius: var(--radius); transition: all 0.12s; letter-spacing: 0.02em; }
  .nav-btn:hover { color: var(--text); background: var(--bg3); }
  .nav-btn.active { color: var(--accent); background: var(--accent-dim); }
  .add-btn { padding: 7px 16px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius); font-family: var(--mono); font-size: 11px; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.12s; }
  .add-btn:hover { opacity: 0.85; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
  .stat { padding: 10px 24px; border-right: 1px solid var(--border); }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .stat-value { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }

  /* Main area */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 200px; border-right: 1px solid var(--border); padding: 14px 12px; display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; overflow-y: auto; background: var(--bg2); transition: width 0.18s, padding 0.18s; }
  .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border-right: none; }
  .sidebar-toggle { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 14px; height: 40px; background: var(--bg2); border: 1px solid var(--border2); border-left: none; border-radius: 0 4px 4px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text3); z-index: 10; transition: left 0.18s; }
  .sidebar-toggle:hover { color: var(--accent); background: var(--bg3); }
  .main { position: relative; }
  .filter-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .filter-group { display: flex; flex-direction: column; }
  select, input[type=text], input[type=date], textarea {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 12px; border-radius: var(--radius); padding: 6px 8px;
    width: 100%; outline: none; transition: border-color 0.12s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 28px; }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }

  /* Table area */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .table-wrap { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead { position: sticky; top: 0; z-index: 2; background: var(--bg2); }
  th { padding: 10px 14px 10px; font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; text-align: left; border-bottom: 1px solid var(--border); font-weight: 400; white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text); line-height: 1.4; }
  tr:hover td { background: var(--bg2); }
  .row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.1s; }
  tr:hover .row-actions { opacity: 1; }
  .act-btn { padding: 3px 10px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 11px; font-family: var(--mono); border-radius: var(--radius); cursor: pointer; transition: all 0.1s; }
  .act-btn:hover { border-color: var(--accent); color: var(--accent); }
  .act-btn.del:hover { border-color: var(--red); color: var(--red); }
  .cell-title { color: var(--text); cursor: pointer; font-weight: 400; }
  .cell-title:hover { color: var(--accent); }
  .cell-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .empty { text-align: center; padding: 60px 24px; color: var(--text3); font-family: var(--mono); font-size: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 11px; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.03em; white-space: nowrap; }
  .b-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(77,255,145,0.2); }
  .b-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(74,158,255,0.2); }
  .b-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,95,95,0.2); }
  .b-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,71,0.2); }
  .b-gray { background: rgba(255,255,255,0.04); color: var(--text2); border: 1px solid var(--border2); }
  .b-purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(180,127,255,0.2); }
  .b-accent { background: var(--accent-dim2); color: var(--accent); border: 1px solid rgba(200,255,0,0.3); }
  .b-must { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,255,0,0.2); font-size: 9px; margin-left: 5px; vertical-align: middle; }
  .b-deep { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(74,158,255,0.2); font-size: 9px; margin-left: 5px; vertical-align: middle; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius2); padding: 24px; width: 500px; max-width: 95vw; max-height: 88vh; overflow-y: auto; }
  .modal-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.04em; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .form-row { margin-bottom: 13px; }
  .form-row label { display: block; font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  textarea { min-height: 72px; resize: vertical; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }
  .modal-btns { display: flex; gap: 8px; }
  .btn-cancel { padding: 7px 16px; background: transparent; border: 1px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 11px; border-radius: var(--radius); cursor: pointer; }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-save { padding: 7px 20px; background: var(--accent); color: #0f0f0f; border: none; font-family: var(--mono); font-size: 11px; font-weight: 500; border-radius: var(--radius); cursor: pointer; }
  .btn-save:hover { opacity: 0.85; }
  .btn-delete-modal { padding: 7px 14px; background: transparent; border: 1px solid rgba(255,95,95,0.3); color: var(--red); font-family: var(--mono); font-size: 11px; border-radius: var(--radius); cursor: pointer; }
  .btn-delete-modal:hover { background: var(--red-dim); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); }
  .checkbox-row label { font-family: var(--mono); font-size: 11px; color: var(--text2); text-transform: none; letter-spacing: 0; }
  .error-msg { font-family: var(--mono); font-size: 11px; color: var(--red); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Bulk actions toolbar */
  /* Sparkline */
  .sparkline-wrap { flex: 1; display: flex; align-items: flex-end; gap: 3px; padding: 10px 20px 10px 8px; min-width: 180px; max-width: 280px; }
  .spark-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 0; }
  .spark-seg { width: 100%; min-height: 1px; border-radius: 1px; }
  .spark-seg.opened { background: var(--amber); opacity: 0.85; }
  .spark-seg.closed { background: var(--green); opacity: 0.85; }
  .spark-seg.overdue { background: var(--red); opacity: 0.85; }
  .spark-day { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 3px; white-space: nowrap; }
  .spark-legend { display: flex; flex-direction: column; justify-content: center; gap: 4px; padding: 10px 16px 10px 0; border-right: 1px solid var(--border); }
  .spark-legend-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; color: var(--text3); white-space: nowrap; }
  .spark-legend-dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }

  .bulk-bar { display: none; align-items: center; gap: 10px; padding: 8px 16px; background: var(--accent-dim2); border-bottom: 1px solid rgba(200,255,0,0.25); flex-shrink: 0; }
  .bulk-bar.visible { display: flex; }
  .bulk-count { font-family: var(--mono); font-size: 11px; color: var(--accent); flex: 1; }
  .bulk-btn { padding: 5px 14px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 11px; font-family: var(--mono); border-radius: var(--radius); cursor: pointer; transition: all 0.1s; }
  .bulk-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bulk-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .bulk-btn.clear { color: var(--text3); }
  .bulk-btn.clear:hover { border-color: var(--text2); color: var(--text2); }
  .row-cb { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
  th.cb-col, td.cb-col { width: 32px; padding-right: 0; }
  tr.selected td { background: var(--accent-dim) !important; }
  .bulk-status-wrap { display: flex; align-items: center; gap: 6px; }
  .bulk-status-wrap select { font-size: 11px; padding: 4px 8px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius); font-family: var(--mono); }

  /* ---- Chat tab ---- */
  .chat-wrap { display: flex; flex-direction: column; height: 100%; background: var(--bg); overflow: hidden; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .chat-msg { display: flex; flex-direction: column; max-width: 70%; gap: 2px; }
  .chat-msg.ai { align-self: flex-start; }
  .chat-msg.user { align-self: flex-end; align-items: flex-end; }
  .chat-msg-label { font-family: var(--mono); font-size: 9px; color: var(--text3); padding: 0 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .chat-bubble { padding: 10px 14px; font-size: 13px; line-height: 1.6; word-break: break-word; border-radius: 10px; }
  .chat-bubble.ai { background: var(--bg2); border: 1px solid var(--border2); color: var(--text); border-top-left-radius: 2px; }
  .chat-bubble.user { background: rgba(200,255,0,0.08); border: 1px solid rgba(200,255,0,0.2); color: var(--text); border-top-right-radius: 2px; }
  .chat-bubble.typing { color: var(--text3); font-style: italic; background: var(--bg2); border: 1px solid var(--border); border-top-left-radius: 2px; }
  .chat-input-row { display: flex; align-items: flex-end; gap: 8px; padding: 10px 16px 12px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
  .chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 13px; border-radius: var(--radius); padding: 8px 12px; outline: none; resize: none; min-height: 36px; max-height: 100px; line-height: 1.4; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send { height: 36px; padding: 0 18px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius); font-family: var(--mono); font-size: 11px; font-weight: 500; cursor: pointer; flex-shrink: 0; letter-spacing: 0.04em; }
  .chat-send:hover { opacity: 0.85; }
  .chat-send:disabled { opacity: 0.35; cursor: not-allowed; }
  .chat-toolbar { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
  .chat-tool-btn { padding: 4px 11px; background: transparent; border: 0.5px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 10px; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.03em; }
  .chat-tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .chat-tool-btn.danger { color: var(--text3); border-color: transparent; margin-left: auto; }
  .chat-tool-btn.danger:hover { color: var(--red); border-color: rgba(255,95,95,0.4); }
  .debrief-banner { margin: 6px 16px 0; padding: 8px 12px; background: var(--accent-dim); border: 1px solid rgba(200,255,0,0.25); border-radius: var(--radius); font-size: 11px; color: var(--accent); font-family: var(--mono); display: flex; align-items: center; justify-content: space-between; }
  .debrief-banner-dismiss { cursor: pointer; color: var(--accent); }
</style>
</head>
<body>

<div id="auth-gate" style="display:none">
  <p style="font-family:var(--mono);color:var(--red);font-size:13px;">&#x2715; Access denied</p>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="brand">&#x25A0; ManSys</div>
    <nav class="nav" id="nav"></nav>
    <button class="add-btn" onclick="openAdd()">+ ADD</button>
  </div>
  <div class="stats-bar" id="stats-bar" style="display:flex;align-items:stretch">
    <div id="stat-cards" style="display:flex"></div>
    <div class="spark-legend" id="spark-legend" style="display:none">
      <div class="spark-legend-item"><div class="spark-legend-dot" style="background:var(--amber)"></div>opened</div>
      <div class="spark-legend-item"><div class="spark-legend-dot" style="background:var(--green)"></div>closed</div>
      <div class="spark-legend-item"><div class="spark-legend-dot" style="background:var(--red)"></div>overdue</div>
    </div>
    <div class="sparkline-wrap" id="sparkline-wrap" style="display:none"></div>
  </div>
  <div class="bulk-bar" id="bulk-bar">
    <span class="bulk-count" id="bulk-count">0 selected</span>
    <div class="bulk-status-wrap" id="bulk-status-wrap" style="display:none">
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">set status:</span>
      <select id="bulk-status-sel"></select>
      <button class="bulk-btn" onclick="bulkUpdateStatus()">Apply</button>
    </div>
    <button class="bulk-btn danger" onclick="bulkDelete()">Delete selected</button>
    <button class="bulk-btn clear" onclick="clearSelection()">Clear</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle filters">‹</button>
    <div class="content" id="main-content">
      <div class="table-wrap" id="table-section">
        <table>
          <thead><tr id="thead-row"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="empty-msg" class="empty" style="display:none">No records match your filters.</div>
        <div id="loading-msg" class="loading">Loading...</div>
      </div>
      <div class="chat-wrap" id="chat-section" style="display:none">
        <div id="debrief-banner" style="display:none"></div>
        <div class="chat-toolbar">
          <button class="chat-tool-btn" onclick="injectDebrief()">📋 Start debrief</button>
          <button class="chat-tool-btn" onclick="injectTaskCreate()">✓ Create task</button>
          <button class="chat-tool-btn" onclick="injectCommitment()">⟳ Log commitment</button>
          <button class="chat-tool-btn danger" onclick="clearChat()">✕ Clear</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" placeholder="Ask anything — create tasks, log commitments, capture a debrief..." rows="1" onkeydown="chatKeyDown(event)" oninput="autoResize(this)"></textarea>
          <button class="chat-send" id="chat-send" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<script>
const ACCESS_TOKEN = 'fdb44961c5a73eb588b68e9614f58671';
const SUPABASE_URL = 'https://dglotzmioswcmhfttcqx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbG90em1pb3N3Y21oZnR0Y3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTE3MzgsImV4cCI6MjA4ODU2NzczOH0.lF_8yxfnP50UpiMKCW3aQxq8HukVZ5ibRqOp-RwFvpQ';

function checkAuth() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (token !== ACCESS_TOKEN) {
    document.getElementById('auth-gate').style.display = 'flex';
    return false;
  }
  document.getElementById('app').style.display = 'flex';
  return true;
}

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...(opts.prefer ? { Prefer: opts.prefer } : {}),
    },
    method: opts.method || 'GET',
    body: opts.body != null ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

let ref = { statuses: [], themes: [], people: [], epics: [] };
let activeTab = 'tasks';
let allRows = [];
let editingId = null;
let selectedIds = new Set();

function toggleRow(id, cb) {
  if (cb.checked) { selectedIds.add(id); } else { selectedIds.delete(id); }
  const row = cb.closest('tr');
  if (row) row.classList.toggle('selected', cb.checked);
  updateBulkBar();
}

function toggleAll(masterCb) {
  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(tr => {
    const cb = tr.querySelector('.row-cb');
    if (!cb) return;
    cb.checked = masterCb.checked;
    const id = parseInt(cb.dataset.id);
    if (masterCb.checked) { selectedIds.add(id); tr.classList.add('selected'); }
    else { selectedIds.delete(id); tr.classList.remove('selected'); }
  });
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const count = document.getElementById('bulk-count');
  const statusWrap = document.getElementById('bulk-status-wrap');
  const n = selectedIds.size;
  if (n === 0) {
    bar.classList.remove('visible');
  } else {
    bar.classList.add('visible');
    count.textContent = n + ' selected';
    // Show status update only for tabs that have status
    const hasStatus = ['tasks','themes','epics'].includes(activeTab);
    statusWrap.style.display = hasStatus ? 'flex' : 'none';
    if (hasStatus) {
      const sel = document.getElementById('bulk-status-sel');
      sel.innerHTML = ref.statuses.map(s => `<option value="${s.status_id}">${s.status_label}</option>`).join('');
    }
  }
}

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.row-cb').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('tr.selected').forEach(tr => tr.classList.remove('selected'));
  const master = document.getElementById('master-cb');
  if (master) master.checked = false;
  updateBulkBar();
}

async function bulkDelete() {
  if (selectedIds.size === 0) return;
  if (!confirm('Delete ' + selectedIds.size + ' records? This cannot be undone.')) return;
  const tables = { themes: 'themes', epics: 'roadmap_items', tasks: 'tasks', commitments: 'commitments', people: 'people' };
  const idKeys = { themes: 'theme_id', epics: 'roadmap_item_id', tasks: 'task_id', commitments: 'commitment_id', people: 'person_id' };
  const ids = Array.from(selectedIds).join(',');
  await api(`${tables[activeTab]}?${idKeys[activeTab]}=in.(${ids})`, { method: 'DELETE' });
  selectedIds.clear();
  updateBulkBar();
  loadTab();
}

async function bulkUpdateStatus() {
  if (selectedIds.size === 0) return;
  const statusId = parseInt(document.getElementById('bulk-status-sel').value);
  if (!statusId) return;
  const tables = { themes: 'themes', epics: 'roadmap_items', tasks: 'tasks' };
  const idKeys = { themes: 'theme_id', epics: 'roadmap_item_id', tasks: 'task_id' };
  const ids = Array.from(selectedIds).join(',');
  await api(`${tables[activeTab]}?${idKeys[activeTab]}=in.(${ids})`, {
    method: 'PATCH',
    body: { status_id: statusId },
    prefer: 'return=minimal'
  });
  selectedIds.clear();
  updateBulkBar();
  loadTab();
}

async function loadRef() {
  const [s, t, p, e] = await Promise.all([
    api('statuses?select=status_id,status_label&order=status_id.asc'),
    api('themes?select=theme_id,title&order=title.asc'),
    api('people?select=person_id,full_name&order=full_name.asc'),
    api('roadmap_items?select=roadmap_item_id,title&order=title.asc'),
  ]);
  ref.statuses = s || [];
  ref.themes = t || [];
  ref.people = p || [];
  ref.epics = e || [];
}

function badge(text, cls) { return `<span class="badge ${cls}">${text}</span>`; }

function statusBadge(label) {
  const map = { 'Done': 'b-green', 'In Progress': 'b-blue', 'Blocked': 'b-red', 'Not Started': 'b-gray', 'Outstanding': 'b-amber', 'Delivered': 'b-green', 'Renegotiated': 'b-purple' };
  return label ? badge(label, map[label] || 'b-gray') : '—';
}

function priBadge(p) {
  if (!p) return '—';
  const m = { High: 'b-red', Medium: 'b-amber', Low: 'b-gray' };
  return badge(p, m[p] || 'b-gray');
}

function dirBadge(d) {
  return d === 'inbound' ? badge('inbound', 'b-blue') : badge('outbound', 'b-amber');
}

function fmtDate(s) {
  if (!s) return '—';
  const d = s.substring(0, 10);
  const today = new Date().toISOString().substring(0, 10);
  if (d < today) return `<span style="color:var(--red)">${d}</span>`;
  return d;
}

function trunc(s, n = 65) {
  if (!s) return '—';
  return s.length > n ? s.slice(0, n) + '…' : s;
}

      <div class="filter-label">Search</div>
      <div class="search-wrap">
        <span class="search-icon">&#x2315;</span>
        <input type="text" id="f-search" placeholder="Search…" oninput="applyFilters()">
      </div>
    </div>
    ${showStatus ? `<div class="filter-group">
      <div class="filter-label">Status</div>
      <div id="f-status-checks" style="display:flex;flex-direction:column;gap:5px;margin-top:2px">
        ${(activeTab === 'commitments'
          ? ['Outstanding','Delivered','Renegotiated']

        ).map(s => `<label style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);cursor:pointer">

function getFilters() {
  const v = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  return {
    q: v('f-search').toLowerCase(),
    status: Array.from(document.querySelectorAll('#f-status-checks input:checked')).map(el => el.value),
    theme: v('f-theme'),
    owner: v('f-owner'),
    must: v('f-must'),
    direction: v('f-direction'),
    overdue: v('f-overdue'),
  };
}

function applyFilters() {
  const f = getFilters();
  const def = TAB_DEF[activeTab];
  const filtered = allRows.filter(r => def.filter(r, f));
  renderTable(filtered);
}

function renderStats(data) {
  const stats = TAB_DEF[activeTab].stats(data);
  document.getElementById('stat-cards').innerHTML = stats.map(s =>
    `<div class="stat"><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div></div>`
  ).join('');
  const showSpark = activeTab === 'tasks';
  document.getElementById('spark-legend').style.display = showSpark ? '' : 'none';
  document.getElementById('sparkline-wrap').style.display = showSpark ? '' : 'none';
  if (showSpark) renderSparkline(data); // async — runs independently
}

async function renderSparkline(data) {
  const _tn = new Date();
  const today = new Date(_tn.getFullYear(), _tn.getMonth(), _tn.getDate(), 0, 0, 0, 0);

  const isoDate = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + dy;
  };

  // 7 days back window
  const windowStart = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 6, 0, 0, 0, 0);

  // Fetch task_updates for the window
  // event_type_id 1 = Created (opened), event_type_id 2 = Status Change
  // Done/Delivered = status_id 4 (Done). We fetch new_status_id to detect closes.
  let updates = [];
  try {
    updates = await api('task_updates?select=task_id,event_type_id,new_status_id,prior_status_id,event_date&event_date=gte.' + windowStart.toISOString() + '&order=event_date.asc') || [];
  } catch(e) {
    console.warn('Sparkline: failed to load task_updates', e);
  }

  const days = [];
  for (let i = 6; i >= 0; i--) {
    days.push(new Date(today.getFullYear(), today.getMonth(), today.getDate() - i, 0, 0, 0, 0));
  }

  // Done status IDs — status_id 4 = Done, also check for Delivered if applicable
  // We treat any transition TO status_id 4 as "closed"
  const DONE_STATUS_IDS = [4];

  // Overdue: tasks whose promise_date = that day and still not done (from tasks data)
  const DONE_STATUSES = ['Done', 'Delivered'];

  const dayData = days.map(day => {
    const dayStr = isoDate(day);

    // Opened: event_type_id 1 (Created) on this day
    const opened = updates.filter(u =>
      u.event_type_id === 1 &&
      (u.event_date || '').substring(0, 10) === dayStr
    ).length;

    // Closed: event_type_id 2 (Status Change) where new_status_id is Done on this day
    const closed = updates.filter(u =>
      u.event_type_id === 2 &&
      DONE_STATUS_IDS.includes(u.new_status_id) &&
      (u.event_date || '').substring(0, 10) === dayStr
    ).length;

    // Overdue: promise_date = this day and not done (from tasks data as before)
    const overdue = data.filter(r =>
      (r.promise_date || '') === dayStr &&
      !DONE_STATUSES.includes(r.statuses?.status_label)
    ).length;

    return { day, dayStr, opened, closed, overdue };
  });

  const maxTotal = Math.max(1, ...dayData.map(d => d.opened + d.closed + d.overdue));
  const BAR_MAX_PX = 36;

  const wrap = document.getElementById('sparkline-wrap');
  wrap.innerHTML = dayData.map(function(d) {
    const hOpened  = Math.round((d.opened  / maxTotal) * BAR_MAX_PX);
    const hClosed  = Math.round((d.closed  / maxTotal) * BAR_MAX_PX);
    const hOverdue = Math.round((d.overdue / maxTotal) * BAR_MAX_PX);
    const label = d.day.toLocaleDateString('en-GB', { weekday: 'narrow' });
    const isToday = isoDate(d.day) === isoDate(today);
    const dayLabel = isToday ? '<span style="color:var(--accent);font-size:8px">Today</span>' : label;
    let html = '<div class="spark-col" title="' + d.dayStr + ': ' + d.opened + ' opened, ' + d.closed + ' closed, ' + d.overdue + ' overdue">';
    if (hOverdue > 0) html += '<div class="spark-seg overdue" style="height:' + hOverdue + 'px"></div>';
    if (hClosed  > 0) html += '<div class="spark-seg closed"  style="height:' + hClosed  + 'px"></div>';
    if (hOpened  > 0) html += '<div class="spark-seg opened"  style="height:' + hOpened  + 'px"></div>';
    html += '<div class="spark-day">' + dayLabel + '</div></div>';
    return html;
  }).join('');
}

function renderTable(data) {
  const def = TAB_DEF[activeTab];
  const masterCb = `<th class="cb-col"><input type="checkbox" id="master-cb" class="row-cb" onchange="toggleAll(this)"></th>`;
  document.getElementById('thead-row').innerHTML = masterCb + def.cols.map(c => `<th>${c}</th>`).join('');
  document.getElementById('loading-msg').style.display = 'none';
  if (!data || data.length === 0) {
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('empty-msg').style.display = 'block';
    return;
  }
  document.getElementById('empty-msg').style.display = 'none';
  const idKey = def.idKey;
  document.getElementById('tbody').innerHTML = data.map(r => {
    const id = r[idKey];
    const checked = selectedIds.has(id);
    const cells = def.row(r);
    const cbCell = `<td class="cb-col"><input type="checkbox" class="row-cb" data-id="${id}" onchange="toggleRow(${id}, this)" ${checked ? 'checked' : ''}></td>`;
    return `<tr class="${checked ? 'selected' : ''}">${cbCell}${cells.map(c => `<td>${c}</td>`).join('')}</tr>`;
  }).join('');
}

async function loadTab() {
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('empty-msg').style.display = 'none';
  const def = TAB_DEF[activeTab];
  allRows = await api(def.endpoint);
  allRows = allRows || [];
  renderStats(allRows);
  applyFilters();
}

async function switchTab(tab) {
  selectedIds.clear();
  updateBulkBar();
  activeTab = tab;
  renderNav();

  const isChat = tab === 'chat';
  document.getElementById('table-section').style.display = isChat ? 'none' : '';
  document.getElementById('chat-section').style.display = isChat ? 'flex' : 'none';
  document.getElementById('sidebar').style.display = isChat ? 'none' : '';
  document.getElementById('sidebar-toggle').style.display = isChat ? 'none' : '';
  document.getElementById('stats-bar').style.display = isChat ? 'none' : '';
  document.getElementById('bulk-bar').style.display = isChat ? 'none' : '';

  if (isChat) {
    if (chatMessages.length === 0) chatGreet();
    document.getElementById('chat-input').focus();
    checkPendingDebriefs();
    return;
  }

  renderSidebar();
  setDefaultStatusFilter();
  await loadTab();
}

function showModal(title, formHtml, showDelete, record) {
  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="closeModalIfOutside(event)">
      <div class="modal">
        <div class="modal-title">${title}</div>
        ${formHtml}
        <div id="form-error" class="error-msg" style="margin-top:8px"></div>
        <div class="modal-footer">
          <div>${showDelete ? `<button class="btn-delete-modal" onclick="confirmDelete(${editingId})">Delete</button>` : ''}</div>
          <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveRecord()">Save</button>
          </div>
        </div>
      </div>
    </div>`;
  // Set select values via JS after render — HTML selected attribute is unreliable
  if (record) {
    const setVal = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = String(val); };
    if (activeTab === 'tasks') {
      setVal('ff-status', record.status_id);
      setVal('ff-theme', record.theme_id);
      setVal('ff-epic', record.epic_id);
      setVal('ff-owner', record.owner_id);
      setVal('ff-reqby', record.requested_by_id);
      setVal('ff-priority', record.priority);
    } else if (activeTab === 'themes') {
      setVal('ff-status', record.status_id);
      setVal('ff-domain', record.domain);
    } else if (activeTab === 'epics') {
      setVal('ff-status', record.status_id);
      setVal('ff-theme', record.theme_id);
      setVal('ff-owner', record.owner_id);
      setVal('ff-domain', record.domain);
    } else if (activeTab === 'commitments') {
      setVal('ff-person', record.person_id);
      setVal('ff-direction', record.direction);
      setVal('ff-status-c', record.status);
    } else if (activeTab === 'people') {
      const setChk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
      setChk('ff-stakeholder', record.is_stakeholder);
      setChk('ff-active', record.is_active !== false);
    }
  }
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function closeModalIfOutside(e) { if (e.target === e.currentTarget) closeModal(); }

async function confirmDelete(id) {
  if (!confirm('Delete this record? This cannot be undone.')) return;
  const tables = { themes: 'themes', epics: 'roadmap_items', tasks: 'tasks', commitments: 'commitments', people: 'people' };
  const idKeys = { themes: 'theme_id', epics: 'roadmap_item_id', tasks: 'task_id', commitments: 'commitment_id', people: 'person_id' };
  await api(`${tables[activeTab]}?${idKeys[activeTab]}=eq.${id}`, { method: 'DELETE' });
  closeModal();
  loadTab();
}

async function saveRecord() {
  const v = id => { const el = document.getElementById(id); return el ? (el.value || null) : null; };
  const vb = id => { const el = document.getElementById(id); return el ? el.checked : false; };
  const vi = id => { const val = v(id); return val ? parseInt(val) : null; };
  let body = {};

  console.log('saveRecord: editingId=', editingId, 'tab=', activeTab);
  const capFirst = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
  if (activeTab === 'themes') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Title is required.'; return; }
    body = { title: capFirst(v('ff-title')), description: v('ff-desc'), domain: v('ff-domain'), status_id: vi('ff-status') };
  } else if (activeTab === 'epics') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Title is required.'; return; }
    body = { title: capFirst(v('ff-title')), description: v('ff-desc'), theme_id: vi('ff-theme'), owner_id: vi('ff-owner'), domain: v('ff-domain'), target_date: v('ff-target'), status_id: vi('ff-status') };
  } else if (activeTab === 'tasks') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Title is required.'; return; }
    body = { title: capFirst(v('ff-title')), description: v('ff-desc'), theme_id: vi('ff-theme'), epic_id: vi('ff-epic'), owner_id: vi('ff-owner'), requested_by_id: vi('ff-reqby'), priority: v('ff-priority'), promise_date: v('ff-due'), status_id: vi('ff-status') || (editingId ? null : 1), is_must_achieve: vb('ff-must'), is_deep_work: vb('ff-deep') };
  } else if (activeTab === 'commitments') {
    if (!v('ff-desc')) { document.getElementById('form-error').textContent = 'Description is required.'; return; }
    body = { description: v('ff-desc'), person_id: vi('ff-person'), direction: v('ff-direction'), promised_date: v('ff-due'), status: v('ff-status-c') };
  } else if (activeTab === 'people') {
    if (!v('ff-title')) { document.getElementById('form-error').textContent = 'Name is required.'; return; }
    body = { full_name: capFirst(v('ff-title')), job_title: v('ff-job-title'), company: v('ff-company'), work_email: v('ff-work-email'), mobile: v('ff-mobile'), relationship_note: v('ff-rel-note'), is_stakeholder: vb('ff-stakeholder'), is_active: vb('ff-active') };
  }

  console.log('raw body:', JSON.stringify(body));
  const tables = { themes: 'themes', epics: 'roadmap_items', tasks: 'tasks', commitments: 'commitments', people: 'people' };
  const idKeys = { themes: 'theme_id', epics: 'roadmap_item_id', tasks: 'task_id', commitments: 'commitment_id', people: 'person_id' };
  try {
    if (editingId) {
      // Strip nulls from optional relational fields only — never strip core editable fields
      // Fields explicitly managed by dropdowns must always be included even if null (user cleared them)
      // Always include non-nullable text/date fields; only include FK/status fields if they have a value
      // This prevents saving a form from nulling out fields the user didn't touch
      const ALWAYS_INCLUDE = {
        themes: ['title','description','domain'],
        epics: ['title','description','domain','target_date'],
        tasks: ['title','description','priority','promise_date','is_must_achieve','is_deep_work'],
        commitments: ['description','direction','promised_date','status'],
        people: ['full_name','job_title','company','work_email','mobile','relationship_note','is_stakeholder','is_active'],
      };
      const keep = new Set(ALWAYS_INCLUDE[activeTab] || []);
      const patchBody = Object.fromEntries(Object.entries(body).filter(([k, val]) => {
        if (keep.has(k)) return true;        // always include core fields (even if null/empty string)
        return val !== null && val !== undefined; // only include FK/status fields if they have a value
      }));
      if (activeTab === 'tasks') { patchBody.is_must_achieve = vb('ff-must'); patchBody.is_deep_work = vb('ff-deep'); }
      console.log('patchBody keys:', Object.keys(patchBody), 'values:', JSON.stringify(patchBody));
      await api(`${tables[activeTab]}?${idKeys[activeTab]}=eq.${editingId}`, { method: 'PATCH', body: patchBody, prefer: 'return=minimal' });
    } else {
      await api(tables[activeTab], { method: 'POST', body, prefer: 'return=minimal' });
    }
    closeModal();
    loadTab();
  } catch(e) {
    document.getElementById('form-error').textContent = 'Save failed: ' + e.message;
  }
}

function setDefaultStatusFilter() {
  // Default: exclude Done (uncheck Done, leave all others checked)
  // Check all status checkboxes except Done
  const checks = document.querySelectorAll('#f-status-checks input[type=checkbox]');
  checks.forEach(cb => {
    cb.checked = cb.value !== 'Done';
  });
  // For commitments, default to Outstanding only
  if (activeTab === 'commitments') {
    checks.forEach(cb => { cb.checked = cb.value === 'Outstanding'; });
  }
}

async function sendChat(prefill) {
  const input = document.getElementById('chat-input');
  const text = prefill || input.value.trim();
  if (!text) return;

  if (!prefill) {
    input.value = '';
    input.style.height = 'auto';
  }

  addChatMsg('user', text);
  document.getElementById('chat-send').disabled = true;
  addTyping();

  // Build messages array for API
  const messages = chatMessages.slice(-20).map(m => ({ role: m.role, content: m.content }));

  try {
    const res = await fetch('https://ngarner.app.n8n.cloud/webhook/dashboard-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages,
        system: buildSystemPrompt(),
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.reply || data.content?.[0]?.text || 'Sorry, no response received.';

    // Strip action tags for display, handle action if present
    const displayReply = reply.replace(/<action>[\s\S]*?<\/action>/g, '').trim();
    addChatMsg('ai', displayReply);

    // Check for action block
    const actionMatch = reply.match(/<action>([\s\S]*?)<\/action>/);
    if (actionMatch) {
      try {
        const action = JSON.parse(actionMatch[1]);
        handleChatAction(action);
      } catch(e) { console.warn('Action parse failed', e); }
    }

  } catch(e) {
    removeTyping();
    addChatMsg('ai', 'Error connecting to AI: ' + e.message);
  }

  document.getElementById('chat-send').disabled = false;
  document.getElementById('chat-input').focus();
}

async function handleChatAction(action) {
  if (action.type === 'task_create' && action.data) {
    try {
      await api('tasks', { method: 'POST', body: { ...action.data, creation_source: 'Dashboard Chat' }, prefer: 'return=minimal' });
      addChatMsg('ai', '✓ Task created and saved to your system.');
    } catch(e) { addChatMsg('ai', 'Failed to save task: ' + e.message); }
  }
  if (action.type === 'commitment_log' && action.data) {
    try {
      await api('commitments', { method: 'POST', body: action.data, prefer: 'return=minimal' });
      addChatMsg('ai', '✓ Commitment logged.');
    } catch(e) { addChatMsg('ai', 'Failed to save commitment: ' + e.message); }
  }
  if (action.type === 'debrief_complete' && action.data) {
    try {
      await api('meeting_records', { method: 'POST', body: action.data, prefer: 'return=minimal' });
      if (chatPendingDebrief) {

      }
      addChatMsg('ai', '✓ Debrief captured and saved.');
    } catch(e) { addChatMsg('ai', 'Failed to save debrief: ' + e.message); }
  }
}

async function loadPendingDebrief(id) {
  try {
    const rows = await api('pending_debriefs?debrief_id=eq.' + id + '&select=debrief_id,pre_filled');
    if (!rows || rows.length === 0) return;
    const pd = rows[0];
    const pf = pd.pre_filled || {};
    chatPendingDebrief = pd.debrief_id;
    document.getElementById('debrief-banner').style.display = 'none';
    const ctx = [
      pf.title ? 'Meeting: ' + pf.title : null,
      pf.date ? 'Date: ' + pf.date : null,

    ].filter(Boolean).join(' | ');
    sendChat('Debrief needed for: ' + ctx + '. Please guide me through the four sections.');
  } catch(e) { console.warn('Failed to load pending debrief', e); }
